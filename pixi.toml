[workspace]
authors = ["Johannes Koester <johannes.koester@uni-due.de>"]
channels = ["conda-forge", "bioconda"]
name = "snakemake-workflow-catalog"
platforms = ["linux-64","osx-arm64"]
version = "0.1.0"

[dependencies]
jinja2 = ">=3.1.6,<4"
pygithub = ">=2.8.1,<3"
gitpython = ">=3.1.46,<4"
snakemake = ">=9.17.2,<10"
snakefmt = ">=0.11.5,<0.12"
python = ">=3.13.12,<3.14"
ratelimit = ">=2.2.1,<3"
mdutils = ">=1.8.1,<2"
sphinx = ">=7.2.6,<8"
sphinxawesome-theme = ">=5.2.0,<6"
sphinx-design = ">=0.7.0,<0.8"
myst-parser = ">=3.0.1,<4"
altair = ">=6.0.0,<7"
sphinxcontrib-jquery = ">=4.1,<5"
sphinx-datatables = ">=1.0.0,<2"
sphinxext-altair = ">=0.2.0,<0.3"
graphviz = ">=14.1.2,<15"
git = ">=2.54.0,<3"
snakemake-storage-plugin-s3 = ">=0.3.6,<0.4"
snakemake-storage-plugin-xrootd = ">=1.1.0,<2"
snakemake-storage-plugin-http = ">=0.3.1,<0.4"
snakemake-storage-plugin-fs = ">=1.1.3,<2"
snakemake-storage-plugin-irods = ">=0.3.1,<0.4"
snakemake-storage-plugin-ftp = ">=0.1.3,<0.2"
snakemake-storage-plugin-zenodo = ">=0.1.5,<0.2"
snakemake-storage-plugin-gcs = ">=1.1.4,<2"
snakemake-storage-plugin-azure = ">=0.4.4,<0.5"

[pypi-dependencies]
dagviz = ">=0.6.0, <0.7"
networkx = ">=3.6.1, <4"
snakevision = ">=1.0.0, <2"

[tasks]
test-generate-catalog = { cmd = "python scripts/generate-catalog.py", env = { OFFSET = "0", N_REPOS = "3", LATEST_COMMIT = "7" } }
test-generate-catalog-single-repo = { cmd = "python scripts/generate-catalog.py", env = { TEST_REPO = "snakemake-workflows/dna-seq-varlociraptor" } }
test-cleanup-catalog = { cmd = "python scripts/cleanup-catalog.py", env = { OFFSET = "0", N_REPOS = "3" } }
generate-catalog = { cmd = "python scripts/generate-catalog.py" }
cleanup-catalog = { cmd = "python scripts/cleanup-catalog.py" }
render-catalog = "sphinx-build source build/html"
